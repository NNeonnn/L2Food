services:
  mongo:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    command: mongod --quiet --logpath /dev/null   # ← disables all console logs
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: pass
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 3s
      retries: 3
  web:
    build: .
    ports:
      - "5237:5237"
      - "5678:5678"
    environment:
      - FLASK_ENV=production
      - MONGO_URL=mongodb://user:pass@mongo:27017
      - MONGO_DB=canteen
      - PYTHONUNBUFFERED=1
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

volumes:
  mongo_data: